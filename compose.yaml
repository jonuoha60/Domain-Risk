version: "3.8"

services:
  web:
    depends_on:
      - server
    
    build: ./frontend
    ports: 
      - 5173:5173
    env_file:
      - ./frontend/.env
    # environemnt:
    #   VITE_API_URL: http://localhost:3000
    
    develop:
      watch:
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/package-lock.json
          action: rebuild
        - path: ./frontend
          target: /app
          action: sync

  server:
    build: ./backend
    ports:
      - 3000:3000
    env_file:
      - ./backend/.env
    
    develop:
      watch:
        - path: ./backend/package.json
          action: rebuild
        - path: ./backend/package-lock.json
          action: rebuild
        - path: ./backend
          target: /app
          action: sync


